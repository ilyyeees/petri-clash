[run]
group_name = "single_gpu_all_targets"
output_root = "runs_v2"
target_glob = "targets/*.png"
seeds = [0]
fallback_seeds = [1, 2]

[runtime]
device = "auto"
matmul_precision = "high"
allow_tf32 = true
benchmark = true

[model]
channels = 24
hidden_size = 256
fire_rate = 0.5

[data]
grid_size = 48
target_size = 40

[train]
steps = 12000
pool_size = 2048
batch_size = 48
lr = 0.0015
weight_decay = 0.0
grad_clip = 1.0
save_every = 250
eval_every = 500
preview_every = 500
fresh_seed_count = 2
damage_prob = 0.6
damage_min_radius_frac = 0.10
damage_max_radius_frac = 0.22
start_rollout_min = 48
start_rollout_max = 96
end_rollout_min = 160
end_rollout_max = 256
channels_last = true
amp = true
amp_dtype = "bfloat16"
compile = true
compile_mode = "default"
resume = true
lr_schedule = "cosine"
warmup_steps = 250
min_lr_scale = 0.08

[loss]
rgba_weight = 0.5
rgb_weight = 1.5
alpha_weight = 1.0
bg_alpha_weight = 2.5
overflow_weight = 5.0
mass_weight = 0.5
hidden_weight = 0.0002
overflow_kernel = 9

[eval]
steps = [64, 128, 192, 256]
preview_steps = [32, 64, 128, 192, 256]
damage_after = 96
recover_steps = 96
recovery_preview_steps = [0, 24, 48, 72, 96]
damage_radius_frac = 0.16
best_tail = 2
score_recovery_weight = 0.35
preview_scale = 6

[stop]
enabled = true
collapsed_min_step = 3000
collapsed_patience_steps = 1000
collapsed_score = 0.2
collapsed_min_delta = 0.001
converged_min_step = 10000
converged_patience_steps = 500
converged_score = 0.00006
converged_min_delta = 0.000005
